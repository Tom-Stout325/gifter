{% load static %}
{% load bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title> {% block title %} {% endblock %}</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" type="text/css" href="{% static 'styles/app.css' %}">
        <link rel="stylesheet" type="text/css" href="https://bootswatch.com/5/spacelab/bootstrap.min.css">

        <link href="{% static 'fontawesomefree/css/fontawesome.css' %}" rel="stylesheet" type="text/css">
        <link href="{% static 'fontawesomefree/css/brands.css' %}" rel="stylesheet" type="text/css">
        <link href="{% static 'fontawesomefree/css/solid.css' %}" rel="stylesheet" type="text/css">
    </head>
    {% for message in messages %}
    {{ messages }}
    {% endfor %}
    <body>
        {% include 'navbar.html' %}
        <div class="container">
            <div class="row">
                <div class="col-sm-12 col-md-6">
                    <img id="header-img" src="{% static 'images/family_tree2.png' %}" alt="Family Tree Logo">
                </div>
                <div class="col-sm-12 col-md-4 ">
                    <h1 id="header-txt">Family Gift Registry</h1>
                </div>
            </div>
        </div>
        <hr>
        {% block content %}

        {% endblock %}
        {% include 'footer.html' %}
    </body>
</html>
