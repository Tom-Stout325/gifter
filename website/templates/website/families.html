{% extends 'index.html' %}
{% load static %}

{% block title %}
    Families
{% endblock %}


{% block content %}

<body>
    <div class="container">
        <h1 class="text-center text-success">Our Family</h1>
    </div>
    <div class="container">

     

        <div class="container">
            <div class="row">

                {% for i in family %}
                <div class="col-sm-12 col-md-6 col-lg-4 p-4 mx-auto">

                    <div class="card" style="width: 18rem;">
                        <img src="{{ MEDIA_URL}}{{i.avatar.url }}" class="card-img-top" id="card-img" alt="family avatar">
                        <div class="card-body">
                            <h5 class="card-title text-center">{{ i.name }}</h5>
                            <p>{{ i.id }}</p>
                        </div>
                       
                        <div class="card-body d-grid gap-2">
                            <span 
                                class="tips card-body d-grid gap-2" 
                                data-bs-toggle="tooltip" 
                                data-bs-placement="right" 
                                title="Please log in to view family members!">
                                <a href="{% url 'family' i.id %}" class="card-link btn btn-outline-primary btn-block">
                                    Family Page
                                </a>
                        </span>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>


        </div>
<script>
    const tooltips = document.querySelectorAll('.tips')
    tooltips.forEach(t => {
        new bootstrap.Tooltip(t)
    })
</script>
</body>
{% endblock %}
